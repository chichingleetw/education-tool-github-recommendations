name: 電阻研究所｜歐姆式導體互動教材
description: 國中理化電學互動教材，讓學生操作電壓、導線長度、直徑、截面積與材料，探索歐姆定律與導線電阻。
educatorSummary: |
  電阻研究所是一套可部署到 GitHub Pages 的純前端互動教材，主題聚焦在歐姆式導體、V-I 圖、導線電阻與長度及截面積的關係。學生可在六個任務中拖動電壓、長度、直徑、截面積與材料控制器，即時觀察電流、電阻與自製 Canvas 圖表的變化，並用資料表與 CSV 匯出保存實驗結果。教材以 `R = ρL/A` 與 `I = V/R` 的簡化模型呈現正比、反比與控制變因概念，也包含工程設計任務、實驗誤差討論、科學家故事、教師專區與可列印學習單，適合用來把國中電學中的公式、圖表判讀與實驗設計串成可操作的探究活動。
