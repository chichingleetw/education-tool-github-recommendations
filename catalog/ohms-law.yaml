educationLevels:
  - 中小學
useCases:
  - 在國中自然科或理化電學單元中，讓學生量測不同電壓下的電流並觀察歐姆式導體的 V-I 直線關係
  - 透過固定材料與截面積後改變導線長度，或固定材料與長度後改變截面積，引導學生理解控制變因與電阻變化
  - 使用工程設計任務、CSV 匯出與科學史閱讀，延伸到資料解讀、成本取捨、實驗誤差與科學發展脈絡
cautions:
  - 教材中的材料電阻率採教學比例值，重點是趨勢觀察與比例推理，不應作為真實工程規格或精密計算
  - 學生容易混淆「電壓增加使電流增加」與「電阻本身增加」，建議要求學生明確寫出控制變因與被操縱變因
  - 若用於正式評量，建議搭配實體電路或課本實驗，讓學生比較模擬模型、真實測量與誤差來源
language: JavaScript
install: |
  可直接開啟 GitHub Pages 線上版本使用。若要本機測試，可下載或 clone 專案後直接用瀏覽器開啟 index.html；也可以在專案資料夾執行 python3 -m http.server 8000，再開啟 http://localhost:8000。
