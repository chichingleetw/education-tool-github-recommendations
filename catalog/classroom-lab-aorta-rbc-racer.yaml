name: Project Aorta：大動脈計畫室｜RBC RACER
description: 駕駛紅血球穿越體循環與肺循環的血液循環教育遊戲，結合血壓、氣體交換與血管危害。
educatorSummary: |
  Project Aorta：大動脈計畫室是 Classroom Lab tzk 的血液循環教育遊戲，副標為 RBC RACER。學生以第一人稱駕駛程序化紅血球，在四個關卡中依序通過腹部及下肢體循環、肺循環、頭部胸部及上肢體循環，以及高危險肺循環。遊戲 HUD 同步顯示血液循環圖、HP、血壓、位置、關卡、分數、距離、速度、姿態與異常狀態，並在體微血管或肺泡微血管加入氧氣與二氧化碳交換 QTE。它適合把體循環、肺循環、充氧血與減氧血、血壓控制、血管危害與氣體交換轉化成任務導向的探索活動。
authorName: kisaraki
authorGitHub: kisaraki
repo: kisaraki/classroom-lab-tzk
homepage:
launchUrl: https://kisaraki.github.io/classroom-lab-tzk/rbcrr/rbcrr.html
tags:
  - education
  - teaching
