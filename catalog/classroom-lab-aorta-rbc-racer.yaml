educationLevels:
  - 中小學
useCases:
  - 在自然科學或生物課中用遊戲任務說明體循環、肺循環與紅血球運輸路線
  - 讓學生操作血壓、閃避血管危害並完成氣體交換，討論循環系統如何維持供氧
  - 搭配 HUD 的循環圖、HP、BP 與異常狀態，引導學生連結遊戲事件與生理概念
cautions:
  - 此頁需要桌面瀏覽器、鍵盤、滑鼠、WebGL、ES Modules 與 Pointer Lock，手機和平板會顯示不支援提示
  - 遊戲中的血壓、HP、速度與血管危害為教學遊戲模型，不應視為真實生理或醫療判斷
  - 建議教師先示範鍵盤、滑鼠與氣體交換 QTE，再讓學生分組挑戰並回到循環圖進行概念整理
language: JavaScript
install: |
  可直接開啟 GitHub Pages 的大動脈計畫室頁面。若要本機使用，請下載 classroom-lab-tzk 專案後以靜態 HTTP 伺服器開啟；此工具不適合直接用 file:// 開啟。
